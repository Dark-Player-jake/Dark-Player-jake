<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 300" role="img" aria-label="Statistik und Sprachen">
  <defs>
    <clipPath id="bar"><rect x="30" y="196" width="1020" height="18" rx="9"/></clipPath>
  </defs>
  <rect width="1080" height="300" rx="14" fill="#0d1117"/>
  <rect x="0.5" y="0.5" width="1079" height="299" rx="14" fill="none" stroke="#30363d"/>

  <!-- Stat-Kacheln -->
  <g>
    <rect x="30" y="28" width="320" height="104" rx="12" fill="#131a24" stroke="#2a3441"/>
    <text x="52" y="88" font-family="Segoe UI, Arial, sans-serif" font-weight="800" font-size="42" fill="#e6edf3">238+</text>
    <text x="54" y="114" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#8b949e">Commits dieses Jahr</text>

    <rect x="380" y="28" width="320" height="104" rx="12" fill="#131a24" stroke="#2a3441"/>
    <text x="402" y="88" font-family="Segoe UI, Arial, sans-serif" font-weight="800" font-size="42" fill="#e6edf3">30</text>
    <text x="404" y="114" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#8b949e">Repositories</text>

    <rect x="730" y="28" width="320" height="104" rx="12" fill="#131a24" stroke="#2a3441"/>
    <text x="752" y="88" font-family="Segoe UI, Arial, sans-serif" font-weight="800" font-size="42" fill="#e6edf3">886</text>
    <text x="754" y="114" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#8b949e">Contributions / Jahr</text>
  </g>

  <!-- Sprachen -->
  <text x="30" y="176" font-family="Consolas, ui-monospace, monospace" font-size="13" letter-spacing="3" fill="#8b949e">SPRACHEN</text>
  <g clip-path="url(#bar)">
    <rect x="30"    y="196" width="530.4" height="18" fill="#f1e05a"/>
    <rect x="560.4" y="196" width="204"   height="18" fill="#178600"/>
    <rect x="764.4" y="196" width="142.8" height="18" fill="#3178c6"/>
    <rect x="907.2" y="196" width="81.6"  height="18" fill="#4F5D95"/>
    <rect x="988.8" y="196" width="61.2"  height="18" fill="#e34c26"/>
  </g>

  <!-- Legende -->
  <g font-family="Segoe UI, Arial, sans-serif" font-size="15">
    <rect x="30"  y="246" width="12" height="12" rx="3" fill="#f1e05a"/><text x="50"  y="256" fill="#c9d1d9">JavaScript <tspan fill="#8b949e">52%</tspan></text>
    <rect x="230" y="246" width="12" height="12" rx="3" fill="#178600"/><text x="250" y="256" fill="#c9d1d9">C# <tspan fill="#8b949e">20%</tspan></text>
    <rect x="360" y="246" width="12" height="12" rx="3" fill="#3178c6"/><text x="380" y="256" fill="#c9d1d9">TypeScript <tspan fill="#8b949e">14%</tspan></text>
    <rect x="560" y="246" width="12" height="12" rx="3" fill="#4F5D95"/><text x="580" y="256" fill="#c9d1d9">PHP <tspan fill="#8b949e">8%</tspan></text>
    <rect x="700" y="246" width="12" height="12" rx="3" fill="#e34c26"/><text x="720" y="256" fill="#c9d1d9">HTML <tspan fill="#8b949e">6%</tspan></text>
